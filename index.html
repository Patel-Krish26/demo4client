  --surf:#141b24;--surf2:#1a2332;
  --bdr:rgba(255,255,255,.07);
  --txt:#f0f4f8;--txt2:#8a9ab0;--txt3:#5a6a7a;
  --radius:16px;--rsm:10px;
  font-family:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}a{text-decoration:none}
.container{width:100%;max-width:1160px;margin:0 auto;padding:0 24px}
.lbl{display:inline-block;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--accent,#c8f64c);

.sec-h{font-family:'Syne',sans-serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:800;line-height:1.1;margin-bottom:18px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;
  transition:transform .2s,box-shadow .2s;border:none;white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn-p{background:var(--accent,#c8f64c);color:#080b10;font-weight:700;
  box-shadow:0 4px 24px rgba(0,0,0,.3)}
.btn-p:hover{box-shadow:0 8px 32px rgba(0,0,0,.4);filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--txt);border:1.5px solid var(--bdr);backdrop-filter:blur(8px)}
.btn-g:hover{border-color:var(--accent,#c8f64c);color:var(--accent,#c8f64c)}
.btn-a{background:var(--accent,#c8f64c);color:#080b10;font-weight:700}
.btn-lg{padding:17px 36px;font-size:16px}
.as{opacity:0;transform:translateY(30px);transition:opacity .6s ease var(--dl,0ms),transform .6s ease var(--dl,0ms)}
.as.vis{opacity:1;transform:none}

/* ── INTRO OVERLAY (sits on top, fades away, content loads behind) ── */
.intro-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.intro-overlay.blocking{pointer-events:all}
/* dark curtain that splits open */
.curtain-l,.curtain-r{
  position:absolute;top:0;height:100%;width:50%;
  background:#080b10;
  transition:transform .7s cubic-bezier(.76,0,.24,1);
}
.curtain-l{left:0;transform:translateX(0)}
.curtain-r{right:0;transform:translateX(0)}
.intro-overlay.open .curtain-l{transform:translateX(-100%)}
.intro-overlay.open .curtain-r{transform:translateX(100%)}
/* center logo that fades on split */
.intro-logo{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  transition:opacity .4s ease .1s,transform .4s ease .1s;
}
.intro-overlay.open .intro-logo{opacity:0;transform:scale(.9)}
.iemoji{font-size:52px;animation:pulse-e 1.2s ease infinite alternate}
@keyframes pulse-e{from{transform:scale(1)}to{transform:scale(1.1)}}
.ititle{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:#f0f4f8;letter-spacing:-.02em}
.isub{color:#8a9ab0;font-size:14px;letter-spacing:.08em}
.ibar{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;margin-top:8px}
.ifill{height:100%;background:#c8f64c;border-radius:10px;animation:fill-it 1.4s ease forwards}
@keyframes fill-it{from{width:0}to{width:100%}}

/* ── SIDE PANEL ── */
.panel{
  position:fixed;top:50%;right:0;transform:translateY(-50%);z-index:1000;
}
.panel-toggle{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:28px;height:56px;background:var(--surf2);border:1px solid var(--bdr);
  border-right:none;border-radius:8px 0 0 8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--txt2);
  transition:background .2s;z-index:2;
}
.panel-toggle:hover{background:var(--surf)}
.panel-inner{
  background:rgba(10,14,20,.95);border:1px solid var(--bdr);
  border-right:none;border-radius:14px 0 0 14px;
  padding:12px 10px;display:flex;flex-direction:column;gap:6px;
  backdrop-filter:blur(16px);
  max-height:90vh;overflow-y:auto;
  width:0;overflow:hidden;
  transition:width .35s cubic-bezier(.4,0,.2,1),padding .35s,opacity .3s;
  opacity:0;margin-right:28px;
}
.panel.open .panel-inner{width:150px;overflow:visible;opacity:1}
.panel-inner::-webkit-scrollbar{width:3px}
.panel-inner::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.plbl{font-size:10px;color:var(--txt3);text-align:center;letter-spacing:.06em;
  padding-bottom:6px;border-bottom:1px solid var(--bdr);margin-bottom:2px;white-space:nowrap}
.pbtn{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2);
  border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;text-align:left;
  white-space:nowrap;width:100%;display:flex;align-items:center;gap:7px}
.pbtn:hover{border-color:var(--ac);color:var(--ac)}
.pbtn.act{background:var(--ac);border-color:var(--ac);color:#080b10;font-weight:700}

/* ── HERO ── */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center;
  animation:pan 14s ease infinite alternate;transition:background-image .6s}
@keyframes pan{from{transform:scale(1.06) translateX(0)}to{transform:scale(1.06) translateX(-24px)}}
.hov{position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(8,11,16,.94) 0%,rgba(8,11,16,.62) 55%,rgba(8,11,16,.84) 100%)}
.hcon{position:relative;z-index:2;padding:120px 48px 80px;max-width:780px;
  animation:hin 1s cubic-bezier(.16,1,.3,1) .15s both}
@keyframes hin{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:none}}
.hbadge{display:inline-block;background:var(--accent,#c8f64c);color:#080b10;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:20px}
.htitle{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,7vw,5rem);font-weight:800;
  line-height:1.05;margin-bottom:20px;letter-spacing:-.03em}
.hsub{font-size:clamp(1rem,2.5vw,1.2rem);color:var(--txt2);margin-bottom:40px}
.hctas{display:flex;flex-wrap:wrap;gap:16px}
.hscroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%)}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--accent,#c8f64c);animation:sb 1.5s ease infinite}
@keyframes sb{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(10px);opacity:.4}}

/* ── ABOUT ── */
.about{padding:100px 0;background:var(--bg2)}
.about-in{display:grid;grid-template-columns:1fr 1.2fr;gap:60px;align-items:center;
  opacity:0;transform:translateY(30px);transition:opacity .7s,transform .7s}
.about-in.vis{opacity:1;transform:none}
.aimg-wrap{position:relative}
.aimg{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:20px;filter:brightness(.9)}
.abadge{position:absolute;bottom:-14px;right:-14px;width:58px;height:58px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;border:3px solid var(--bg2)}
.arole{color:var(--accent,#c8f64c);font-size:14px;font-weight:500;letter-spacing:.05em;margin-bottom:8px}
.atag{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--txt2);margin-bottom:14px;font-style:italic}
.adesc{color:var(--txt2);line-height:1.75;margin-bottom:32px;font-size:15.5px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surf);
  border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.stat{display:flex;flex-direction:column;align-items:center;padding:40px 20px;
  border-right:1px solid var(--bdr);
  opacity:0;transform:translateY(20px);
  transition:opacity .5s ease calc(var(--i)*110ms),transform .5s ease calc(var(--i)*110ms)}

.stat.vis{opacity:1;transform:none}
.sv{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1;margin-bottom:6px}
.sl{font-size:13px;color:var(--txt3);letter-spacing:.05em;text-align:center}

.services{padding:100px 0;background:var(--bg)}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:48px}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);padding:34px;

.sdesc{color:var(--txt2);font-size:14.5px;line-height:1.65}

/* ── GALLERY ── */
.gallery{padding:100px 0;background:var(--bg2)}
.ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px}
.gi{border-radius:12px;overflow:hidden}
.gimg{width:100%;aspect-ratio:3/4;object-fit:cover;transition:transform .4s,filter .4s;filter:brightness(.85)}
.gimg:hover{transform:scale(1.04);filter:brightness(1)}

/* ── REVIEWS ── */
.reviews{padding:100px 0;background:var(--bg3)}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:48px}
.rc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);padding:32px}
.stars{color:#fbbf24;font-size:18px;letter-spacing:2px;display:block;margin-bottom:14px}
.rtext{color:var(--txt2);font-size:15px;line-height:1.7;margin-bottom:14px;font-style:italic}
.rname{font-size:13px;font-weight:600;color:var(--accent,#c8f64c)}

/* ── CTA ── */
.cta-sec{position:relative;padding:120px 0;overflow:hidden;text-align:center}
.ctabg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(0,0,0,0),rgba(0,0,0,0))}
.cta-glow{position:absolute;inset:0;opacity:.18;
  background:radial-gradient(ellipse 60% 50% at 50% 50%,var(--accent,#c8f64c),transparent 70%)}
.cta-in{position:relative;z-index:1}
.ctatitle{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.4rem);font-weight:800;margin-bottom:16px}
.ctasub{color:var(--txt2);font-size:17px;margin-bottom:40px}
.ctabtns{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}

/* ── FOOTER ── */
.footer{background:var(--bg);border-top:1px solid var(--bdr);padding:40px 0}
.fin{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px}
.fbrand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent,#c8f64c);margin-bottom:4px}
.fcopy{font-size:13px;color:var(--txt3)}
.flinks{display:flex;gap:16px}
.flink{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;
  border:1px solid var(--bdr);border-radius:100px;font-size:14px;color:var(--txt2);
  transition:border-color .25s,color .25s}
.flink:hover{border-color:var(--accent,#c8f64c);color:var(--accent,#c8f64c)}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-right:none}
  .sgrid{grid-template-columns:1fr}
  .ggrid{grid-template-columns:repeat(2,1fr)}
  .rgrid{grid-template-columns:1fr}
  .about-in{grid-template-columns:1fr}
  .aimg{aspect-ratio:16/9}

  .cta-sec{padding:80px 0}
  .btn-lg{padding:14px 22px;font-size:15px}
  .ititle{font-size:28px}
}
</style>

/* ── HOOK ── */
function useInView(thr=0.12){
  const ref=useRef(null);
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{threshold:thr});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[thr]);
  return [ref,vis];
}

/* ── INTRO: curtain-reveal overlay ── */
function Intro({onDone}){
  const [phase,setPhase]=useState('show'); // show → open → gone
  useEffect(()=>{
    const t1=setTimeout(()=>setPhase('open'),1500);
    const t2=setTimeout(()=>{ setPhase('gone'); onDone(); },2300);
    return()=>{clearTimeout(t1);clearTimeout(t2)};
  },[onDone]);
  if(phase==='gone') return null;
  return(
    <div className={`intro-overlay${phase==='show'?' blocking':''}${phase==='open'?' open':''}`}>
      <div className="curtain-l"/>
      <div className="curtain-r"/>
      <div className="intro-logo">
        <div className="iemoji">🌐</div>
        <div className="ititle">ProPresence</div>
        <div className="isub">Premium Websites for Professionals</div>
        <div className="ibar"><div className="ifill"/></div>
      </div>
    </div>
  );
}

/* ── ANIM WRAPPER ── */
function AS({children,cls='',delay=0}){
  const [ref,vis]=useInView();
  return(
    <div ref={ref} className={`as${vis?' vis':''} ${cls}`} style={{'--dl':`${delay}ms`}}>
      {children}
    </div>
  );
}

/* ── SIDE PANEL (scrollable, all 14 professions) ── */
function Panel({active,set}){
  const [open,setOpen]=useState(false);
  return(
    <div className={`panel${open?' open':''}`}>
      <div className="panel-toggle" onClick={()=>setOpen(o=>!o)} title="Switch Demo">
        {open ? '›' : '‹'}
      </div>
      <div className="panel-inner">
        <div className="plbl">🎯 Switch Demo</div>
        {DEMOS.map(d=>(
          <button key={d.id}
            className={`pbtn${active===d.id?' act':''}`}
            style={{'--ac':d.accent}}
            onClick={()=>{set(d.id);setOpen(false);window.scrollTo({top:0,behavior:'smooth'});}}>
            <span>{d.emoji}</span><span>{d.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── SECTIONS ── */
function Hero({d}){
  return(
    <section className="hero" style={{'--accent':d.accent}}>
      <div className="hbg" style={{backgroundImage:`url(${d.bg})`}}/>
      <div className="hov"/>
      <div className="hcon">
        <div className="hbadge">{d.emoji} {d.label}</div>
        <h1 className="htitle">{d.hero_title}</h1>
        <p className="hsub">{d.hero_sub}</p>
        <div className="hctas">
          <a href={d.wa} target="_blank" rel="noreferrer" className="btn btn-p">💬 WhatsApp Us</a>
          <a href={`mailto:${d.email}`} className="btn btn-g">✉️ Email Us</a>
        </div>
      </div>
      <div className="hscroll"><div className="hdot"/></div>
    </section>
  );
}

function About({d}){
  const [ref,vis]=useInView();
  return(
    <section className="about" style={{'--accent':d.accent}}>
      <div className="container">
        <div ref={ref} className={`about-in${vis?' vis':''}`}>
          <div className="aimg-wrap">
            <img src={d.gallery[0]} alt={d.name} className="aimg" loading="lazy"/>
            <div className="abadge" style={{background:d.accent}}>{d.emoji}</div>
          </div>
          <div>
            <span className="lbl">About</span>
            <h2 className="sec-h">{d.name}</h2>
            <p className="arole">{d.title}</p>
            <p className="atag">{d.tagline}</p>
            <p className="adesc">{d.about}</p>
            <a href={d.wa} target="_blank" rel="noreferrer" className="btn btn-a">Get In Touch →</a>
          </div>
        </div>
      </div>
    </section>
  );
}

function Stats({d}){
  const [ref,vis]=useInView();
  return(
    <div className="stats" ref={ref} style={{'--accent':d.accent}}>
      {d.stats.map((s,i)=>(
        <div key={i} className={`stat${vis?' vis':''}`} style={{'--i':i}}>
          <span className="sv" style={{color:d.accent}}>{s.v}</span>
          <span className="sl">{s.l}</span>
        </div>
      ))}
    </div>
  );
}

function Services({d}){
  return(
    <section className="services" style={{'--accent':d.accent}}>
      <div className="container">
        <AS><span className="lbl">What We Offer</span><h2 className="sec-h">Our Services</h2></AS>
        <div className="sgrid">
          {d.services.map((s,i)=>(
            <AS key={i} delay={i*80} cls="sc">
              <div className="sicon" style={{background:`${d.accent}1a`,color:d.accent}}>{s.icon}</div>
              <h3 className="stitle">{s.name}</h3>
              <p className="sdesc">{s.desc}</p>
            </AS>
          ))}
        </div>
      </div>
    </section>
  );
}

function Gallery({d}){
  return(
    <section className="gallery" style={{'--accent':d.accent}}>
      <div className="container">
        <AS><span className="lbl">Gallery</span><h2 className="sec-h">See Our Work</h2></AS>
        <div className="ggrid">
          {d.gallery.map((src,i)=>(
            <AS key={i} delay={i*70} cls="gi">
              <img src={src} alt={`Gallery ${i+1}`} className="gimg" loading="lazy"/>
            </AS>
          ))}
        </div>
      </div>
    </section>
  );
}

function Reviews({d}){
  return(
    <section className="reviews" style={{'--accent':d.accent}}>
      <div className="container">
        <AS><span className="lbl">Testimonials</span><h2 className="sec-h">What Clients Say</h2></AS>
        <div className="rgrid">
          {d.reviews.map((r,i)=>(
            <AS key={i} delay={i*90} cls="rc">
              <span className="stars">{'★'.repeat(r.stars)}</span>
              <p className="rtext">"{r.text}"</p>
              <span className="rname">— {r.name}</span>
            </AS>
          ))}
        </div>
      </div>
    </section>
  );
}

function CTA({d}){
  return(
    <section className="cta-sec" style={{'--accent':d.accent}}>
      <div className="ctabg"/><div className="cta-glow"/>
      <div className="container cta-in">
        <AS>
          <h2 className="ctatitle">Ready to Get Started?</h2>
          <p className="ctasub">Reach out today — your transformation begins with one message.</p>
          <div className="ctabtns">
            <a href={d.wa} target="_blank" rel="noreferrer" className="btn btn-p btn-lg">💬 WhatsApp Now</a>
            <a href={`mailto:${d.email}`} className="btn btn-g btn-lg">✉️ {d.email}</a>
          </div>
        </AS>
      </div>
    </section>
  );
}

function Footer({d}){
  return(
    <footer className="footer" style={{'--accent':d.accent}}>
      <div className="container fin">
        <div>
          <div className="fbrand">ProPresence</div>
          <p className="fcopy">© {new Date().getFullYear()} {d.name}. All rights reserved.</p>
        </div>
        <div className="flinks">
          <a href={d.wa} target="_blank" rel="noreferrer" className="flink">💬 WhatsApp</a>
          <a href={`mailto:${d.email}`} className="flink">✉️ Email</a>
        </div>
      </div>
    </footer>
  );
}

/* ── APP ── */
function App(){
  const [showIntro,setShowIntro]=useState(true);
  const [active,setActive]=useState('gym');
  const d=DEMOS.find(x=>x.id===active);
  return(
    <div style={{'--accent':d.accent}}>
      {showIntro && <Intro onDone={()=>setShowIntro(false)}/>}
      <Panel active={active} set={setActive}/>
      <Hero d={d}/>
      <About d={d}/>
      <Stats d={d}/>
      <Services d={d}/>
      <Gallery d={d}/>
      <Reviews d={d}/>
      <CTA d={d}/>
      <Footer d={d}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
